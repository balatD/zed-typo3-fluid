id = "fluid"
name = "TYPO3 Fluid"
description = "Syntax highlighting and snippets for the TYPO3 Fluid templating language."
version = "0.0.1"
schema_version = 1
authors = ["CP/COMPARTNER <itservice@cp-compartner.de>"]
repository = "https://github.com/your-org/zed-typo3-fluid"

# Fluid templates are HTML with Fluid ViewHelper tags (<f:...>) and {expressions}.
# We reuse the official tree-sitter HTML grammar (same commit Zed's HTML extension
# pins) as the base parse and specialize Fluid constructs via highlights.scm.
[grammars.html]
repository = "https://github.com/tree-sitter/tree-sitter-html"
commit = "bfa075d83c6b97cd48440b3829ab8d24a2319809"

# Phase 3 (language server) will add, once the standalone Fluid LSP exists:
# [language_servers.fluid-language-server]
# name = "Fluid Language Server"
# language = "Fluid"
