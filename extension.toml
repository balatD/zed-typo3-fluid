id = "fluid"
name = "TYPO3 Fluid"
description = "TYPO3 Fluid: highlighting, snippets and a language server (completion, hover, diagnostics)."
version = "0.0.1"
schema_version = 1
authors = ["Dragan Balatinac <itservice@cp-compartner.de>"]
repository = "https://github.com/balatD/zed-typo3-fluid"

# Dedicated tree-sitter grammar for Fluid: extends tree-sitter-html with
# {expressions}, inline ViewHelpers, pipelines, casts, arrays, {namespace ...}
# and dynamic tag names.
#
# PUBLISHING: this file:// path works for local dev only. Before submitting to
# the Zed registry, push tree-sitter-fluid to https://github.com/balatD/tree-sitter-fluid
# and change `repository` below to that URL (commit must exist on the remote).
# See PUBLISHING.md.
[grammars.fluid]
repository = "file:///Users/draganbalatinac/Projects/private/tree-sitter-fluid"
commit = "9098914792f8a76d9d277fcc8ebad3e280b3ad6d"

# Bundled dependency-free Node language server (server/server.js): ViewHelper
# completion, hover docs and live diagnostics. Spawned via src/lib.rs.
[language_servers.fluid-language-server]
name = "Fluid Language Server"
language = "Fluid"
