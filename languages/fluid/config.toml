name = "Fluid"
grammar = "html"

# Zed's path_suffixes do NOT support globs or directory matching, so the VS Code
# extension's directory-based detection (Resources/Private/Templates/**/*.html ...)
# cannot be reproduced. We reliably auto-detect the explicit Fluid suffixes only.
# Plain *.html files inside TYPO3 template directories must be switched to "Fluid"
# manually (command palette: "language selector") or renamed to *.fluid.html.
path_suffixes = ["fluid.html", "fluid.htm", "fluid.txt", "fluid"]

autoclose_before = ">})"
block_comment = { start = "<!--", prefix = "", end = "-->", tab_size = 0 }
wrap_characters = { start_prefix = "<", start_suffix = ">", end_prefix = "</", end_suffix = ">" }
completion_query_characters = ["-", ":"]

brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["comment", "string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["comment", "string"] },
    { start = "<", end = ">", close = false, newline = true, not_in = ["comment", "string"] },
    { start = "!--", end = " --", close = true, newline = false, not_in = ["comment", "string"] },
]

[overrides.default]
linked_edit_characters = ["-"]
